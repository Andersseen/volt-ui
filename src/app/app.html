<div
  class="min-h-screen bg-background text-foreground font-sans transition-colors duration-200 selection:bg-primary/20"
>
  <!-- Fancy Background Elements -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div
      class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-[100%] bg-primary/20 blur-[120px] mix-blend-screen opacity-50"
    ></div>
    <div
      class="absolute top-[60%] -right-[10%] w-[40%] h-[60%] rounded-[100%] bg-primary/20 blur-[120px] mix-blend-screen opacity-30"
    ></div>
  </div>

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-background/70 backdrop-blur-xl border-b border-border/40">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div
          class="flex items-center justify-center w-8 h-8 rounded-lg bg-primary text-primary-foreground font-bold text-xl shadow-[0_0_15px_rgba(var(--color-primary),0.5)]"
        >
          ⚡
        </div>
        <span
          class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-foreground to-foreground/60"
        >
          Volt UI
        </span>
        <volt-badge
          variant="secondary"
          class="font-mono text-xs hidden sm:inline-flex border-none shadow-sm ring-1 ring-border/50"
          >v0.0.1</volt-badge
        >
      </div>
      <div class="flex items-center gap-4">
        <nav class="hidden md:flex gap-6 text-sm font-medium text-muted-foreground mr-4">
          <a
            routerLink="/"
            routerLinkActive="text-foreground"
            [routerLinkActiveOptions]="{ exact: true }"
            class="transition-colors hover:text-foreground"
            >Home</a
          >
          <a
            routerLink="/docs"
            routerLinkActive="text-foreground"
            class="transition-colors hover:text-foreground"
            >Components</a
          >
          <a href="#" class="transition-colors hover:text-foreground">GitHub</a>
        </nav>

        <app-theme-switcher />
      </div>
    </div>
  </header>

  <router-outlet />
</div>
