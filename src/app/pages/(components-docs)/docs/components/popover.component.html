<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold tracking-tight text-foreground">Popover</h1>
    <p class="text-base text-muted-foreground mt-2">
      Displays rich content in a portal, triggered by clicking an element.
    </p>
  </div>

  <div class="w-full h-px bg-border"></div>

  <div class="space-y-4">
    <h2 class="text-xl font-semibold tracking-tight text-foreground">Example</h2>
    <div
      class="p-8 border border-border rounded-lg bg-card/30 flex items-center justify-center min-h-[300px]"
    >
      <volt-button variant="outline" [voltPopover]="myPopover" placement="bottom">
        Open Popover
      </volt-button>

      <ng-template #myPopover>
        <volt-popover-content>
          <div class="space-y-2">
            <h4 class="font-medium leading-none">Dimensions</h4>
            <p class="text-sm text-muted-foreground">Set the dimensions for the layer.</p>
          </div>
        </volt-popover-content>
      </ng-template>
    </div>
  </div>

  <app-code-panel
    title="Component Source"
    [code]="popoverCode"
    cliCommand="npx github:Andersseen/volt-ui add popover"
    description="Copy this code to your project. The component uses ng-primitives/popover."
  />
</div>
