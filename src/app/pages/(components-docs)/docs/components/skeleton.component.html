<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold tracking-tight">Skeleton</h1>
    <p class="text-lg text-muted-foreground mt-2">
      Use to show a placeholder while content is loading.
    </p>
  </div>

  <app-code-panel title="Usage" [code]="skeletonUsage" [tabbed]="true">
    <div
      class="border rounded-xl border-border/50 p-6 md:p-10 flex flex-col items-center justify-center bg-background/50 relative overflow-hidden min-h-[300px]"
    >
      <div class="relative z-10 w-full max-w-sm space-y-6">
        <!-- Card skeleton -->
        <div class="rounded-lg border border-border p-4 space-y-3">
          <div class="flex items-center gap-4">
            <volt-skeleton variant="circle" width="40px" height="40px" />
            <div class="space-y-2 flex-1">
              <volt-skeleton variant="text" width="60%" height="16px" />
              <volt-skeleton variant="text" width="40%" height="14px" />
            </div>
          </div>
          <volt-skeleton variant="rectangle" width="100%" height="120px" />
          <div class="space-y-2">
            <volt-skeleton variant="text" width="100%" height="14px" />
            <volt-skeleton variant="text" width="90%" height="14px" />
            <volt-skeleton variant="text" width="70%" height="14px" />
          </div>
        </div>

        <!-- List skeleton -->
        <div class="space-y-3">
          <div class="flex items-center gap-4">
            <volt-skeleton variant="circle" width="32px" height="32px" />
            <volt-skeleton variant="text" width="120px" height="14px" />
          </div>
          <div class="flex items-center gap-4">
            <volt-skeleton variant="circle" width="32px" height="32px" />
            <volt-skeleton variant="text" width="160px" height="14px" />
          </div>
          <div class="flex items-center gap-4">
            <volt-skeleton variant="circle" width="32px" height="32px" />
            <volt-skeleton variant="text" width="100px" height="14px" />
          </div>
        </div>
      </div>
    </div>
  </app-code-panel>

  <app-code-panel
    title="Component Source"
    [code]="skeletonCode"
    cliCommand="npx github:Andersseen/volt-ui add skeleton"
    description="Copy this code to your project."
  />
</div>
