<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold tracking-tight">Avatar</h1>
    <p class="text-lg text-muted-foreground mt-2">
      An image element with a fallback for representing the user.
    </p>
  </div>

  <!-- Usage Example -->
  <app-code-panel title="Usage" [code]="avatarUsage" [tabbed]="true">
    <div
      class="border rounded-xl border-border/50 p-6 md:p-10 flex flex-col items-center justify-center bg-background/50 relative overflow-hidden min-h-[300px]"
    >
      <div class="relative z-10 flex gap-4">
        <volt-avatar>
          <img voltAvatarImage src="https://github.com/shadcn.png" alt="@shadcn" />
          <volt-avatar-fallback>CN</volt-avatar-fallback>
        </volt-avatar>

        <volt-avatar>
          <img
            voltAvatarImage
            src="https://i.pravatar.cc/150?u=a042581f4e29026704d"
            alt="@janedoe"
          />
          <volt-avatar-fallback>JD</volt-avatar-fallback>
        </volt-avatar>

        <volt-avatar>
          <volt-avatar-fallback>AP</volt-avatar-fallback>
        </volt-avatar>
      </div>
    </div>
  </app-code-panel>

  <!-- Source Code Section -->
  <app-code-panel
    title="Component Source"
    [code]="avatarCode"
    cliCommand="npx @voltui/cli add avatar"
    description="Copy this code to your project. The component uses ng-primitives/avatar."
  />
</div>
