<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold tracking-tight">Input & Forms</h1>
    <p class="text-lg text-muted-foreground mt-2">
      Displays a form input field or a component that looks like an input field.
    </p>
  </div>

  <div
    class="border rounded-xl border-border/50 p-6 md:p-10 bg-background/50 relative overflow-hidden"
  >
    <div
      class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px]"
    ></div>

    <div
      class="relative z-10 max-w-sm mx-auto space-y-8 bg-background p-6 rounded-lg shadow-sm border border-border/50"
    >
      <div class="space-y-2">
        <volt-label htmlFor="email">Email</volt-label>
        <volt-input type="email" id="email" placeholder="Email" />
        <p class="text-sm text-muted-foreground">Enter your email address.</p>
      </div>

      <div class="space-y-2">
        <volt-label htmlFor="file">File</volt-label>
        <volt-input type="file" id="file" />
      </div>

      <div class="space-y-2">
        <volt-label htmlFor="message">Message (Textarea)</volt-label>
        <volt-textarea
          id="message"
          placeholder="Type your message here."
          [rows]="4"
        ></volt-textarea>
      </div>
    </div>
  </div>

  <!-- Source Code Section -->
  <app-code-panel
    title="Component Source"
    [code]="inputCode"
    cliCommand="npx github:Andersseen/volt-ui add input"
    description="Copy this code to your project. The component uses ng-primitives/input."
  />
</div>
