<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold tracking-tight text-foreground">Radio</h1>
    <p class="text-base text-muted-foreground mt-2">
      A set of checkable buttons—known as radio buttons—where no more than one of the buttons can be
      checked at a time.
    </p>
  </div>

  <div class="w-full h-px bg-border"></div>

  <div class="space-y-4">
    <h2 class="text-xl font-semibold tracking-tight text-foreground">Example</h2>
    <div
      class="p-8 border border-border rounded-lg bg-card/30 flex items-center justify-center min-h-[300px]"
    >
      <volt-radio-group orientation="vertical" value="default">
        <volt-radio-item value="default">Default</volt-radio-item>
        <volt-radio-item value="comfortable">Comfortable</volt-radio-item>
        <volt-radio-item value="compact">Compact</volt-radio-item>
      </volt-radio-group>
    </div>
  </div>

  <!-- Source Code Section -->
  <app-code-panel
    title="Component Source"
    [code]="radioCode"
    cliCommand="npx github:Andersseen/volt-ui add radio"
    description="Copy this code to your project. The component uses ng-primitives/radio."
  />
</div>
