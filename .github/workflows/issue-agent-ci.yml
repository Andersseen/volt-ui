name: 🤖 Issue Improver Agent

on:
  issues:
    types: [opened]

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: 📥 Descargar código fuente
        uses: actions/checkout@v4

      - name: 📖 Leer instrucciones del Agente
        id: read_agent
        run: |
          # Lee el archivo MD y lo guarda en una variable de entorno para usarlo después
          AGENT_PROMPT=$(cat .github/agents/issue-improver.md)
          echo "prompt<<EOF" >> $GITHUB_ENV
          echo "$AGENT_PROMPT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🧠 Ejecutar Agente y Mejorar Issue
        uses: actions/github-script@v7
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        with:
          script: |
            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || "No description provided.";
            const systemInstructions = process.env.prompt;

            // 1. Preparamos el payload para el Agente (Ejemplo usando fetch a una API de IA genérica)
            const userMessage = `Title: ${issueTitle}\n\nOriginal Body:\n${issueBody}`;

            // Aquí iría tu llamada fetch() real a la API (OpenAI, Anthropic, Gemini, etc.)
            // pasándole systemInstructions como "System" y userMessage como "User".

            /* LÓGICA DE LA API AQUÍ */

            // SIMULACIÓN: Suponiendo que la respuesta de la IA se guardó en `agentResponse`
            const agentResponse = `> ✨ *This issue was formatted by our AI Agent based on the [Issue Improver rules](../blob/main/.github/agents/issue-improver.md).* \n\n (Aquí va la respuesta formateada por la IA...)`;

            // 2. El agente actualiza el Issue original en GitHub
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: agentResponse
            });
